name: CI & Deploy to Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Tests are commented out until MVP is ready
  # test:
  #   name: Lint & Test
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: rnht-platform
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: 22
  #         cache: npm
  #         cache-dependency-path: rnht-platform/package-lock.json
  #
  #     - run: npm ci
  #
  #     - name: Lint
  #       run: npx next lint
  #
  #     - name: Run tests with coverage
  #       run: npm run test:coverage
  #
  #     - name: Upload coverage report
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: coverage-report
  #         path: rnht-platform/coverage/
  #         retention-days: 14

  build-and-deploy:
    name: Build & Deploy to Firebase
    # needs: test  # Re-enable when tests are turned back on
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rnht-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rnht-platform/package-lock.json

      - run: npm ci

      - name: Remove API routes for static build
        run: rm -rf src/app/api

      - name: Build
        env:
          STATIC_EXPORT: "1"
        run: npx next build

      - name: Add .nojekyll file
        run: touch out/.nojekyll

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: rnht-platform
          entryPoint: rnht-platform

  # Also deploy to GitHub Pages
  deploy-pages:
    name: Deploy to GitHub Pages
    # needs: test  # Re-enable when tests are turned back on
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    defaults:
      run:
        working-directory: rnht-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rnht-platform/package-lock.json

      - run: npm ci

      - name: Remove API routes for static build
        run: rm -rf src/app/api

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: /rnht
          STATIC_EXPORT: "1"
        run: npx next build

      - name: Add .nojekyll file
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: rnht-platform/out

      - id: deployment
        uses: actions/deploy-pages@v4
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}
